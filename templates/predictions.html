<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Analysis | HealthCoach AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="p-6 bg-[#020617] text-white">
    <nav class="flex justify-between items-center mb-10 border-b border-slate-800 pb-5">
        <h2 class="text-2xl font-bold text-indigo-500">Analysis Center</h2>
        <a href="/dashboard" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-lg font-bold transition">Back to Dashboard</a>
    </nav>

    <div class="text-center mb-12">
        <h1 class="text-4xl font-black mb-2">Detailed Health <span class="gradient-text">Insights</span></h1>
        <p class="text-slate-500 uppercase text-xs font-bold tracking-widest">Analyzing your data from Firebase</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-7xl mx-auto pb-10">
        <div class="glass-card p-8 h-[400px]">
            <h3 class="text-lg font-bold mb-6 text-indigo-400">Stress Prediction Trends</h3>
            <canvas id="chart-stress-detail"></canvas>
        </div>
        <div class="glass-card p-8 h-[400px]">
            <h3 class="text-lg font-bold mb-6 text-emerald-400">Steps vs Activity</h3>
            <canvas id="chart-steps-activity"></canvas>
        </div>
    </div>

    <script type="module" src="/static/predictions.js"></script>
</body>
</html>
